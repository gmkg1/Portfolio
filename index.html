    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .brutalist-shadow { box-shadow: 4px 4px 0px 0px #FF4D00; }
        .brutalist-shadow-white { box-shadow: 4px 4px 0px 0px #ffffff; }
        .grid-lines { background-image: radial-gradient(#343535 1px, transparent 1px); background-size: 24px 24px; }
        .dither-texture { opacity: 0.05; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .clip-slant { clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%); }
    </style>

    <!-- Custom Brutalist Styles -->
    <style type="text/css">
        body {
            background-color: #0D0D0D;
            color: #FFFFFF;
        }
        
        .brutalist-border {
            border: 3px solid #FFFFFF;
        }
        
        .brutalist-shadow {
            box-shadow: 6px 6px 0px 0px #FFFFFF;
        }
        
        .brutalist-shadow-orange {
            box-shadow: 6px 6px 0px 0px #B83500;
        }
        
        .active-press:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .technical-card {
            position: relative;
        }

        .technical-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(400px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(184, 53, 0, 0.15), transparent 80%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1;
        }

        .technical-card:hover::before {
            opacity: 1;
        }

        /* Webkit Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0D0D0D;
            border-left: 1px solid #262626;
        }
        ::-webkit-scrollbar-thumb {
            background: #B83500;
            border: 2px solid #0D0D0D;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF8C00;
        }
    </style>

    <!-- AngularJS & Route -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    
    <!-- Application Logic -->
    <script src="app.js"></script>
</head>
<body ng-app="portfolioApp" ng-controller="AppController" class="bg-background text-primary font-body-md flex flex-col min-h-screen selection:bg-signal-orange selection:text-white">

    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden opacity-20 grayscale mix-blend-screen">
        <img alt="" class="w-full h-full object-cover object-center scale-110"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvk-giHGQgFGhSmJRecwnXrJRv4XN20VazO3inKK2LtV0N-XRx54kPul4z1q9wRNny1IsBQs3g3bb1sr36Mwd2sqPwWn-fnAO4TPpESGifybWPmLoeTvn3N2P_iFPgwAijM2TMl5B1POzyvQKvz65HzkDgd0O9P4HFIPdQrSInQ5LwVFTRXocgzxTKghvZtiz7ezZEyzfpNcbGmEjWKdWHd9UeOPEEcuiUDisGClNrhDxhvnwgwRdOmCsgGtpyVGafY5AV2LWyDBXC"/>
    </div>

    <!-- Top Navigation Header -->
    <header class="border-b-4 border-white sticky top-0 bg-background/95 backdrop-blur z-40">
        <div class="px-margin-desktop py-4 flex justify-between items-center max-w-[1400px] mx-auto">
            <!-- Branding Logo -->
            <a href="#!/" class="font-display-lg text-xl md:text-2xl font-extrabold uppercase tracking-tighter text-white hover:text-signal-orange transition-colors" header-branding>
                MAHEEN.DEV
            </a>

            <!-- Desktop Nav Links -->
            <nav class="hidden md:flex items-center gap-gutter font-data-mono text-sm">
                <a href="#!/" ng-class="{'text-signal-orange font-bold': isActive('/')}" class="hover:text-signal-orange transition-colors">HOME</a>
                <a href="#!/projects" ng-class="{'text-signal-orange font-bold': isActive('/projects')}" class="hover:text-signal-orange transition-colors">PROJECTS</a>
                <a href="#!/experience" ng-class="{'text-signal-orange font-bold': isActive('/experience')}" class="hover:text-signal-orange transition-colors">EXPERIENCE</a>
                <a href="#!/contact" ng-class="{'text-signal-orange font-bold': isActive('/contact')}" class="hover:text-signal-orange transition-colors">CONTACT</a>
            </nav>

            <!-- Action Buttons -->
            <div class="flex items-center gap-4">
                <!-- Terminal Toggle Button -->
                <button ng-click="toggleTerminal()" class="brutalist-border bg-signal-orange text-background px-3 py-1.5 flex items-center justify-center font-data-mono text-xs font-bold hover:bg-transparent hover:text-white transition-all active-press" title="Open Console">
                    <span class="material-symbols-outlined mr-1 text-base">terminal</span>
                    SHELL
                </button>

                <!-- Mobile Menu Button -->
                <button ng-click="toggleMobileMenu()" class="md:hidden text-white flex items-center justify-center p-1 focus:outline-none" aria-label="Toggle Navigation Menu">
                    <span class="material-symbols-outlined text-3xl">{{mobileMenuOpen ? 'close' : 'menu'}}</span>
                </button>
            </div>
        </div>

        <!-- Mobile Drawer Navigation -->
        <div ng-show="mobileMenuOpen" class="md:hidden border-t-2 border-white bg-background flex flex-col font-data-mono text-base divide-y divide-outline-variant">
            <a href="#!/" ng-click="mobileMenuOpen = false" class="px-margin-desktop py-4 hover:bg-surface-container transition-colors" ng-class="{'text-signal-orange bg-surface-container-low font-bold': isActive('/')}">[01] HOME</a>
            <a href="#!/projects" ng-click="mobileMenuOpen = false" class="px-margin-desktop py-4 hover:bg-surface-container transition-colors" ng-class="{'text-signal-orange bg-surface-container-low font-bold': isActive('/projects')}">[02] PROJECTS</a>
            <a href="#!/experience" ng-click="mobileMenuOpen = false" class="px-margin-desktop py-4 hover:bg-surface-container transition-colors" ng-class="{'text-signal-orange bg-surface-container-low font-bold': isActive('/experience')}">[03] EXPERIENCE</a>
            <a href="#!/contact" ng-click="mobileMenuOpen = false" class="px-margin-desktop py-4 hover:bg-surface-container transition-colors" ng-class="{'text-signal-orange bg-surface-container-low font-bold': isActive('/contact')}">[04] CONTACT</a>
        </div>
    </header>

    <!-- Main View Container -->
    <main class="flex-grow max-w-[1400px] w-full mx-auto py-12 px-6 md:px-margin-desktop relative z-10" ng-view>
        <div class="fixed inset-0 dither-texture z-[100]"></div>
        <!-- AngularJS routes will mount templates here -->
    </main>

    <!-- Footer -->
    <footer class="border-t-4 border-white bg-surface-container-lowest mt-auto">
        <div class="px-margin-desktop py-8 max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-gutter font-data-mono text-xs text-outline">
            <div>
                &copy; 2026 GULAM MAHEEN KHADER. All rights reserved. <span class="hidden md:inline">|</span> <a href="#!/privacy" class="hover:text-signal-orange transition-colors">Privacy Policy</a>
            </div>
            <div class="flex gap-4">
                <span>BCA STUDENT • KJSDC</span>
                <span>//</span>
                <span>BACKEND • AI/ML • ERP</span>
            </div>
        </div>
    </footer>

    <!-- Interactive Retro Terminal Console Overlay -->
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" ng-show="terminalOpen" aria-modal="true" role="dialog">
        <div class="w-full max-w-2xl bg-black border-4 border-signal-orange brutalist-shadow-orange flex flex-col h-[450px]">
            <!-- Terminal Header -->
            <div class="bg-signal-orange text-background px-4 py-2.5 flex justify-between items-center font-data-mono text-xs font-bold select-none">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-background animate-pulse"></span>
                    <span>MAHEEN_ENGINEER CORE_SHELL v8.2.1</span>
                </div>
                <button class="hover:text-white font-black px-1.5 active:scale-95 transition-transform" ng-click="toggleTerminal()" title="Close Shell">[X]</button>
            </div>
            
            <!-- Terminal Console History -->
            <div id="terminal-console" class="flex-grow p-4 overflow-y-auto font-data-mono text-xs text-signal-orange space-y-1 bg-black">
                <div ng-repeat="line in terminalHistory track by $index" class="whitespace-pre-wrap leading-relaxed">{{line}}</div>
            </div>
            
            <!-- Terminal Input Form -->
            <form ng-submit="processCommand(terminalInput)" class="border-t-2 border-signal-orange p-3 flex bg-black items-center">
                <span class="text-signal-orange font-data-mono text-sm mr-2 select-none">&gt;</span>
                <input id="terminal-input-field" 
                       type="text" 
                       ng-model="terminalInput" 
                       class="flex-grow bg-transparent text-signal-orange font-data-mono text-xs focus:outline-none border-none p-0 caret-signal-orange" 
                       placeholder="type 'help' for authorized commands..."
                       autocomplete="off" />
            </form>
        </div>
    </div>

    <script>
        // Micro-interaction for technical cards
        document.querySelectorAll('.group').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        // Simple typing effect for branding
        const branding = document.querySelector('header h1');
        if(branding) {
            branding.addEventListener('mouseenter', () => {
                branding.style.letterSpacing = '0.1em';
                branding.style.transition = 'letter-spacing 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });
            branding.addEventListener('mouseleave', () => {
                branding.style.letterSpacing = '-0.05em';
            });
        }
    </script>

</body>
</html>
